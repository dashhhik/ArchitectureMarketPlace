name: marketplace

services:
  user-identity-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-identity-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
